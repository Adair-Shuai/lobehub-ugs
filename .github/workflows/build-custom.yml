# ============================================================
# LobeHub UGS - 自定义品牌镜像自动构建
#
# 触发方式:
#   1. 定时触发: 每 6 小时拉取最新 canary 并重建
#   2. 手动触发: GitHub Actions → Build Custom Image → Run workflow
#
# 构建产物推送到: ghcr.io/<owner>/lobehub-ugs:canary
# ============================================================

name: Build Custom Image

on:
  schedule:
    # 每 6 小时检查一次上游更新
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: '手动指定镜像标签 (默认 canary)'
        required: false
        default: 'canary'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # --------------------------------------------------
      # 1. 检出本仓库（包含 Dockerfile + 品牌资源）
      # --------------------------------------------------
      - name: Checkout this repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. 登录 GitHub Container Registry
      # --------------------------------------------------
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------
      # 3. 拉取最新官方 canary 作为缓存层
      # --------------------------------------------------
      - name: Pull latest official canary
        run: |
          docker pull lobehub/lobehub:canary || echo "Pull failed, will build all layers"

      # --------------------------------------------------
      # 4. 构建自定义镜像
      # --------------------------------------------------
      - name: Build custom image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # --------------------------------------------------
      # 5. 输出构建结果
      # --------------------------------------------------
      - name: Image digest
        run: |
          echo "✅ 构建完成"
          echo "📦 镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary"
          echo "🔖 版本: ${{ github.run_number }}"
