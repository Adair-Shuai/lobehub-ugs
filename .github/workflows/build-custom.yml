# ============================================================
# LobeHub UGS - 自定义品牌镜像自动构建
#
# 触发方式:
#   1. push 到 main 分支
#   2. 定时触发: 每 6 小时拉取最新 canary 并重建
#   3. 手动触发: GitHub Actions → Build Custom Image → Run workflow
#
# 构建产物推送到: ghcr.io/<owner>/lobehub-ugs:canary
# ============================================================

name: Build Custom Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.dockerignore'
  schedule:
    # 每 6 小时检查一次上游更新
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # --------------------------------------------------
      # 1. 检出本仓库
      # --------------------------------------------------
      - name: Checkout this repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. 将仓库名转为小写（ghcr.io 要求全小写）
      # --------------------------------------------------
      - name: Lowercase image name
        id: image_name
        run: |
          echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # 3. 登录 GitHub Container Registry
      # --------------------------------------------------
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------
      # 4. 拉取最新官方 canary
      # --------------------------------------------------
      - name: Pull latest official canary
        run: |
          docker pull lobehub/lobehub:canary || echo "Pull failed, will build all layers"

      # --------------------------------------------------
      # 5. 构建并推送自定义镜像
      # --------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:canary
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:${{ github.run_number }}

      # --------------------------------------------------
      # 6. 输出构建结果
      # --------------------------------------------------
      - name: Image digest
        run: |
          echo "✅ 构建完成"
          echo "📦 镜像: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:canary"
          echo "🔖 版本: ${{ github.run_number }}"
